name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git zip unzip colordiff libltdl-dev libffi-dev libssl-dev autoconf autotools-dev libtool pkg-config zlib1g-dev python3-pip python3-setuptools python3-venv openjdk-17-jdk

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Cache Buildozer NDK/SDK and packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build Android APK
      run: |
        # Clean build cache to force re-installing updated requirements
        buildozer android clean
        # Accept licenses automatically
        yes | buildozer android debug
      env:
        # Prevent interactive prompts
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoodLuck-LotteryApp-Debug
        path: bin/*.apk
